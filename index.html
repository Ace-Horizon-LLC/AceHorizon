<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace Horizon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* ======================
   SMOOTH PAGE LOAD
====================== */
body {
  opacity: 0;
  animation: fadeIn .8s ease forwards;
}

@keyframes fadeIn { to { opacity: 1; } }

/* ======================
   THEME VARIABLES
====================== */
:root, [data-theme="dark"] {
  --glass: rgba(255, 255, 255, .05);
  --border: rgba(255, 255, 255, .12);
  --text: #ffffff;
  --muted: #cbd5e1;
  --bg1: #020617;
  --bg2: #0f172a;
  --bg3: #1e293b;
  --neon: #00f6ff;
  --pink: #ff2bd1;
}

[data-theme="light"] {
  --glass: rgba(255, 255, 255, .6);
  --border: rgba(0, 0, 0, .08);
  --text: #111827;
  --muted: #475569;
  --bg1: #eef2ff;
  --bg2: #e0e7ff;
  --bg3: #c7d2fe;
}

/* ======================
   BODY + BACKGROUND
====================== */
body {
  font-family: 'Space Grotesk', sans-serif;
  color: var(--text);
  margin: 0;
  overflow-x: hidden;
  background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg1));
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  transition: background .4s ease, color .4s ease;
}

@keyframes gradientShift {
  0% { background-position: 0% 50% }
  50% { background-position: 100% 50% }
  100% { background-position: 0% 50% }
}

/* ======================
   GLASS SYSTEM
====================== */
.glass {
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  background: var(--glass);
  border-bottom: 1px solid var(--border);
}

.glass-card {
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  transition: .4s;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
}

.glass-card:hover {
  transform: translateY(-6px);
  border-color: var(--neon);
}

/* ======================
   HEADER
====================== */
header {
  padding: 1.2rem 6%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  font-family: Orbitron;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--neon);
}

/* ======================
   HERO
====================== */
.hero {
  text-align: center;
  padding: 5rem 6%;
}

.pfp-wrapper {
  width: 130px;
  height: 130px;
  margin: 0 auto 2rem;
  border-radius: 50%;
  position: relative;
}

#pfp {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--neon);
}

.gradient {
  background: linear-gradient(to right, var(--neon), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.typing {
  margin-top: 1rem;
  font-family: 'JetBrains Mono';
  color: var(--muted);
  min-height: 1.5em;
}

.hero-buttons {
  margin-top: 2rem;
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* Skeleton Loading State */
.avatar-skeleton {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.07);
  overflow: hidden;
}

.avatar-skeleton::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%);
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer { 100% { transform: translateX(100%); } }

/* ======================
   PREMIUM BUTTONS
====================== */
.premium-btn {
  padding: 12px 22px;
  border-radius: 14px;
  font-weight: 500;
  font-size: 0.95rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all .3s ease;
}

.primary-btn {
  background: linear-gradient(135deg, var(--neon), var(--pink));
  color: #000;
  border: none;
  font-weight: 600;
}

.primary-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0, 246, 255, .3);
}

.outline-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--text);
}

/* ======================
   SECTIONS & REPO GRID
====================== */
.about, .repos, .contact {
  padding: 3rem 6%;
  max-width: 900px;
  margin: auto;
}

#repoGrid {
  display: grid;
  gap: 1.5rem;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  color: var(--text);
  box-sizing: border-box;
}

footer { padding: 3rem; text-align: center; }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
</style>
</head>
<body>

<audio id="clickSfx" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<header class="glass">
  <div class="logo">ACE HORIZON</div>
  <button id="themeToggle" class="premium-btn outline-btn" style="padding: 10px;">
    <i data-lucide="moon"></i>
  </button>
</header>

<section class="hero">
  <div class="pfp-wrapper">
    <div id="pfpSkeleton" class="avatar-skeleton"></div>
    <img id="pfp" alt="Profile" style="display:none;">
  </div>

  <h1 style="font-family: Orbitron;">VIBE <span class="gradient">DEVELOPER</span></h1>
  <p class="typing" id="typing"></p>

  <div class="hero-buttons">
    <a href="https://chai4.me/aceyash-dev" target="_blank" class="premium-btn primary-btn">
      <i data-lucide="coffee"></i> Support
    </a>
    <a href="https://instagram.com/archives.of.yash" target="_blank" class="premium-btn outline-btn">
      <i data-lucide="instagram"></i> @archives.of.yash
    </a>
  </div>
</section>

<section class="about">
  <div class="glass-card">
    <h2 style="font-family: Orbitron;">About</h2>
    <p>
      Vibe Developer from Varanasi.<br>
      Chill Guy.<br>
      I build clean, optimized digital systems with minimal hardware and maximum control.
    </p>
  </div>
</section>

<section class="repos">
  <h2 style="font-family: Orbitron;">GitHub Systems</h2>
  <div id="repoGrid"></div>
</section>

<section class="contact">
  <div class="glass-card">
    <h2 style="font-family: Orbitron;">Contact</h2>
    <form id="contactForm">
      <input type="text" name="name" placeholder="Your Name" required>
      <textarea name="message" rows="4" placeholder="Message" required></textarea>
      <button type="submit" class="premium-btn primary-btn">
        <i data-lucide="send"></i> Send
      </button>
    </form>
    <p id="formStatus" style="margin-top:10px;"></p>
  </div>
</section>

<footer class="glass">
  © 2026 Ace Horizon
</footer>

<script>
// Initialize Lucide Icons
lucide.createIcons();

// Theme Toggle Logic
const themeBtn = document.getElementById('themeToggle');
themeBtn.addEventListener('click', () => {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', newTheme);
    themeBtn.innerHTML = newTheme === 'light' ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
    lucide.createIcons();
});

// Typing Effect
const typingText = "Vibe Developer from Varanasi. Building clean systems.";
let index = 0;
function type() {
    if (index < typingText.length) {
        document.getElementById("typing").textContent += typingText.charAt(index);
        index++;
        setTimeout(type, 80);
    }
}
window.onload = type;

// Fetch GitHub Repos
async function fetchRepos() {
    const grid = document.getElementById('repoGrid');
    const username = "aceyash-dev"; // Change this to your GitHub username

    try {
        const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=6`);
        const repos = await response.json();

        // Update Profile Picture
        if(repos.length > 0) {
            const pfp = document.getElementById('pfp');
            pfp.src = repos[0].owner.avatar_url;
            pfp.onload = () => {
                document.getElementById('pfpSkeleton').style.display = 'none';
                pfp.style.display = 'block';
            };
        }

        grid.innerHTML = repos.map(repo => `
            <a href="${repo.html_url}" target="_blank" class="repo-card">
                <h3 style="color:var(--neon); margin-top:0;">${repo.name}</h3>
                <p style="font-size:0.9rem; color:var(--muted);">${repo.description || 'No description provided.'}</p>
                <div style="margin-top:1rem; font-size:0.8rem; display:flex; gap:10px;">
                    <span>⭐ ${repo.stargazers_count}</span>
                    <span>🍴 ${repo.forks_count}</span>
                    <span style="color:var(--pink)">${repo.language || ''}</span>
                </div>
            </a>
        `).join('');
    } catch (error) {
        grid.innerHTML = "<p>Failed to load systems. Check connection.</p>";
    }
}
fetchRepos();
</script>
</body>
</html>
